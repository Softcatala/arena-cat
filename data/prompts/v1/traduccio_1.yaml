Tradueix aquest text al català central, seguint la normativa de l'IEC (Institut d'Estudis Catalans), en un registre molt col·loquial, tractament de "tu", com si li ho expliquessis a un amic per WhatsApp.

Llevo tres días pidiéndole a mi padre que llame a la compañía porque el internet va lentísimo. Él dice que ya lo ha hecho, pero yo lo dudo bastante, la verdad, porque ayer se me colgó hasta el grupo de clase tres veces. Si esto sigue así, me planto en la tienda y arrastro yo misma al técnico.
