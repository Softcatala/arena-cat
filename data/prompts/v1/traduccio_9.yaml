Tradueix aquest text al balear, seguint la normativa de l'IEC (Institut d'Estudis Catalans), en un registre infantil, com si ho expliquessis a un nen petit abans d'anar a dormir.

Cuando llega la noche, la niña se pone su pijama favorito y se mete en la cama con su osito de peluche. Desde la ventana se ve el cielo lleno de estrellas y una de ellas le canta una nana en voz muy bajita, para que pueda dormir bien.
