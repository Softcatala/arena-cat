Tradueix aquest text al català central, seguint la normativa de l'IEC (Institut d'Estudis Catalans), en un registre infantil, com si ho expliquessis a un nen petit.

Un pequeño piojo quería volar y lo deseó con tanta fuerza que conjuró a todas las moscas a su alrededor. Desde aquel entonces el piojo se convirtió en un magnate del transporte aéreo.
