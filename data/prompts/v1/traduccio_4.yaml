Tradueix aquest text al valencià, seguint la normativa de l'AVL (Acadèmia Valenciana de la Llengua), en un registre col·loquial, com si ho expliquessis a un amic per WhatsApp.

¡Hola, chicos! Ya sabéis que el viernes hacemos puente, así que, ¿qué os parece si vamos tempranito para pillar un buen sitio antes de que se llene la playa de gente? Si alguien quiere traer a los peques, hay una zona de juegos cerca. Yo traigo la sombrilla y las cervecitas, pero alguien tiene que encargarse de la comida. ¿Quién se anima?
