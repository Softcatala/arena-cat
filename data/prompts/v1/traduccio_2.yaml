Tradueix aquest text al català central, seguint la normativa de l'IEC (Institut d'Estudis Catalans), en un registre jurídic i formal, com el que trobaries en una notificació d'una comunitat de propietaris.

Se comunica a todos los propietarios que, en la reunión celebrada el día 14 de mayo, la comunidad acordó por mayoría simple aprobar la derrama extraordinaria para la reparación de la fachada. Si no se abona el importe en el tiempo convenido, se procederá conforme a la normativa de propiedad horizontal vigente.
