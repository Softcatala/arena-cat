Tradueix aquest text al valencià, seguint la normativa de l'AVL (Acadèmia Valenciana de la Llengua), en un registre infantil, com si ho expliquessis a un nen petit.

Cuando el cielo se pone triste, sus nubes se llenan de agua y ya no pueden aguantar más. Entonces dejan caer sus gotitas, y eso es lo que llamamos lluvia. Cuando termina, el sol vuelve a salir y seca cada rincón con su luz.
